packages:
  - 'packages/*'

# Shared dependency versions. Both `sladocs` (which bundles them via tsdown) and
# `sladocs-build` (which ships them so `npx sladocs-build` can run `waku build`)
# depend on these; the catalog keeps the two version lists from drifting.
catalog:
  '@fumadocs/base-ui': ^16.9.1
  '@tailwindcss/vite': ^4.3.0
  beautiful-mermaid: ^1.1.3
  commander: ^14.0.3
  flexsearch: ^0.8.212
  fumadocs-core: ^16.9.1
  hast-util-to-jsx-runtime: ^2.3.6
  ignore: ^7.0.5
  katex: 0.17.0
  lucide-react: ^1.16.0
  react: ^19.2.6
  react-dom: ^19.2.6
  rehype-katex: ^7.0.1
  rehype-raw: ^7.0.0
  remark: ^15.0.1
  remark-gfm: ^4.0.1
  remark-math: ^6.0.0
  remark-rehype: ^11.1.2
  tailwindcss: ^4.3.0
  tinyglobby: ^0.2.16
  unified: ^11.0.5
  unist-util-visit: ^5.1.0
  vfile: ^6.0.3
  vite: ^8.0.14
  waku: 1.0.0-beta.0
  yaml: ^2.6.0
  zod: ^4.4.3
